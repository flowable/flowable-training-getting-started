server.port=8091
server.servlet.context-path=/

# == Embedded DB ==
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./h2-database/flowable-design;DB_CLOSE_ON_EXIT=FALSE

spring.datasource.username=flowable
spring.datasource.password=flowable

# In order for hot swapping to work for the custom.js and custom.css
spring.thymeleaf.cache=false
spring.web.resources.chain.cache=false

# Enable all endpoints over HTTP
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=ALWAYS
# Pretty-print JSON responses
spring.jackson.serialization.indent_output=true

flowable.design.user-store.password=test
flowable.design.remote.idm-url=http://localhost:8090
flowable.design.remote.authentication.user=admin
flowable.design.remote.authentication.password=test

flowable.design.db-store-enabled=false
flowable.design.deployment-api-url=http://localhost:8090/app-api
flowable.design.undeployment-api-url=http://localhost:8090/platform-api/app-deployments

flowable.training.deploy-demo-apps=true

# Make sure that your user either has the formComponentDeveloper or admin role.
# On this environment, we're admin.
flowable.design.custom-components.enabled=true
flowable.design.form-component-development.enabled=true
flowable.design.security.access-token.signing-secret=hrDXbyFIOaaenwfernSSNtdChRkHkhUY

flowable.design.indexing.enable-query-test=true
flowable.design.agent.enable-agent-test=true
flowable.design.service-registry.enable-service-test=true
flowable.design.service.mcp.discovery-enabled=true